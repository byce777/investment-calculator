<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Investment Growth Calculator</title>
  <style>
    :root {
      --bg: #0d0f1a;
      --card: #151929;
      --accent: #00e5ff;
      --accent2: #ff6b6b;
      --gold: #ffd166;
      --text: #e8eaf6;
      --subtext: #8892b0;
      --border: #1e2a45;
      --green: #06d6a0;
      --purple: #c77dff;
      --shadow: 0 14px 35px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #0d0f1a 0%, #0a1223 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 18px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    h1 { margin: 0; font-size: clamp(1.4rem, 2.8vw, 2.1rem); color: var(--accent); }
    .version { color: var(--subtext); font-size: 0.9rem; }
    .divider { height: 1px; background: linear-gradient(90deg, var(--accent), transparent); margin-bottom: 16px; }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
    .card { background: rgba(21,25,41,0.92); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 18px 18px 10px; color: var(--gold); font-weight: 700; }
    .card-body { padding: 0 18px 18px; }
    .grid { display: grid; gap: 12px; }
    .field label { display: block; color: var(--subtext); font-size: 0.92rem; margin-bottom: 6px; font-weight: 600; }
    .field input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 1rem; outline: none; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    button, .file-label { border: 0; border-radius: 14px; padding: 12px 14px; font-size: 0.98rem; font-weight: 700; cursor: pointer; text-align: center; }
    .primary { background: var(--accent); color: #071018; }
    .secondary, .file-label { background: #1a2239; color: var(--text); border: 1px solid var(--border); }
    .file-label { display: block; margin-top: 10px; }
    #configFile { display: none; }
    .results { display: grid; gap: 12px; margin-top: 14px; }
    .section { border-top: 1px solid var(--border); padding-top: 12px; }
    .section-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; gap: 10px; padding: 4px 0; align-items: baseline; }
    .label { color: var(--subtext); font-size: 0.95rem; }
    .value { text-align: right; font-weight: 700; }
    .green { color: var(--green); }
    .red { color: var(--accent2); }
    .gold { color: var(--gold); }
    .purple { color: var(--purple); }
    .muted { color: var(--subtext); }
    .chart-wrap { padding: 0 18px 18px; }
    .chart-box { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 10px; overflow: hidden; }
    #chartContainer { width: 100%; min-height: 360px; }
    #chartSvg { width: 100%; height: 100%; display: block; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; color: var(--subtext); font-size: 0.9rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; transform: translateY(1px); }
    .note, .status { margin-top: 10px; color: var(--subtext); font-size: 0.88rem; line-height: 1.4; }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      #chartContainer { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>◈ Investment Growth Calculator</h1>
      <div class="version">offline iPhone web app</div>
    </div>
    <div class="divider"></div>
    <div class="layout">
      <section class="card">
        <div class="card-header">● INPUTS</div>
        <div class="card-body">
          <div class="grid">
            <div class="field"><label for="balance">💵 Current Balance ($)</label><input id="balance" type="number" value="10000" min="0" step="0.01" /></div>
            <div class="field"><label for="monthly">📅 Monthly Contribution ($)</label><input id="monthly" type="number" value="500" min="0" step="0.01" /></div>
            <div class="field"><label for="years">📆 Years to Invest</label><input id="years" type="number" value="30" min="1" step="1" /></div>
            <div class="field"><label for="annualReturn">📈 Annual Return (%)</label><input id="annualReturn" type="number" value="8" min="0" step="0.01" /></div>
            <div class="field"><label for="age">🎂 Your Current Age</label><input id="age" type="number" value="30" min="0" step="1" /></div>
            <div class="field"><label for="currentYear">🗓️ Current Year</label><input id="currentYear" type="number" value="2026" min="1900" step="1" /></div>
          </div>
          <div class="actions">
            <button class="primary" id="calcBtn">▶ CALCULATE</button>
            <button class="secondary" id="resetBtn">↺ RESET</button>
          </div>
          <label class="file-label" for="configFile">⬆ Import JSON or CSV values</label>
          <input id="configFile" type="file" accept=".json,.csv,text/csv,application/json" />
          <div class="status" id="fileStatus"></div>
          <div class="results" id="results"></div>
        </div>
      </section>
      <section class="card">
        <div class="card-header">● GROWTH CHART</div>
        <div class="chart-wrap">
          <div class="chart-box"><div id="chartContainer"></div>
            <div class="legend">
              <span><span class="dot" style="background:#00e5ff"></span>Invested Portfolio</span>
              <span><span class="dot" style="background:#ff6b6b"></span>Savings Only</span>
              <span><span class="dot" style="background:#ffd166"></span>$1,000,000 milestone</span>
            </div>
          </div>
          <div class="note">This version uses SVG instead of canvas, so it is more reliable on iPhone and when opened directly as a local file.</div>
        </div>
      </section>
    </div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const colors = { bg:'#0d0f1a', accent:'#00e5ff', accent2:'#ff6b6b', gold:'#ffd166', text:'#e8eaf6', subtext:'#8892b0', border:'#1e2a45', green:'#06d6a0', purple:'#c77dff' };
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function futureValue(pv, pmt, annualReturn, years) {
      const r = annualReturn / 100 / 12; const months = years * 12;
      if (r === 0) return pv + pmt * months;
      return pv * Math.pow(1 + r, months) + pmt * ((Math.pow(1 + r, months) - 1) / r);
    }
    function savingsValue(pv, pmt, years) { return pv + pmt * years * 12; }
    function monthlyNeededForMillion(pv, annualReturn, years) {
      const target = 1000000, r = annualReturn / 100 / 12, months = years * 12;
      if (months <= 0) return Infinity;
      if (r === 0) return Math.max(0, (target - pv) / months);
      const fvPv = pv * Math.pow(1 + r, months);
      if (fvPv >= target) return 0;
      return ((target - fvPv) * r) / (Math.pow(1 + r, months) - 1);
    }
    function yearsToMillion(pv, pmt, annualReturn) {
      const target = 1000000, r = annualReturn / 100 / 12;
      if (r === 0) { if (pv >= target) return 0; if (pmt <= 0) return null; return Math.ceil((target - pv) / pmt / 12); }
      let lo = 0, hi = 1200;
      if (futureValue(pv, pmt, annualReturn, hi / 12) < target) return null;
      while (lo < hi) { const mid = Math.floor((lo + hi) / 2); if (futureValue(pv, pmt, annualReturn, mid / 12) >= target) hi = mid; else lo = mid + 1; }
      return Math.ceil(lo / 12);
    }
    function yearlySeries(pv, pmt, annualReturn, years) {
      const invested = [], saved = [];
      for (let y = 1; y <= years; y++) { invested.push(futureValue(pv, pmt, annualReturn, y)); saved.push(savingsValue(pv, pmt, y)); }
      return { invested, saved };
    }
    function fmtMoney(value, decimals = 2) {
      if (!Number.isFinite(value)) return '—';
      return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:decimals }).format(value);
    }
    function parseInputs() {
      const balance = parseFloat($('balance').value), monthly = parseFloat($('monthly').value), years = parseInt($('years').value,10), annualReturn = parseFloat($('annualReturn').value), age = parseInt($('age').value,10), currentYear = parseInt($('currentYear').value,10);
      if ([balance, monthly, years, annualReturn, age, currentYear].some(v => Number.isNaN(v))) throw new Error('Please enter valid numbers in all fields.');
      if (years <= 0 || annualReturn < 0 || monthly < 0 || balance < 0 || age < 0) throw new Error('All values must be positive, and years must be at least 1.');
      return { balance, monthly, years, annualReturn, age, currentYear };
    }
    function row(label, value, cls='') { return `<div class="row"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`; }
    function renderResults(d) {
      const milestoneWindow = d.pmtNeeded <= 0 ? row('✅ Status:', 'Already on track!', 'green') : row('📌 Required Monthly PMT:', fmtMoney(d.pmtNeeded), 'gold');
      const millionaireYear = d.yrsNeeded === null ? 'Never (increase contributions)' : `${d.currentYear + d.yrsNeeded} (in ${d.yrsNeeded} yrs)`;
      const millionaireAge = d.yrsNeeded === null ? '—' : `${d.age + d.yrsNeeded} years old`;
      $('results').innerHTML = `
        <div class="section">
          <div class="section-title" style="color:${colors.accent}">● PROJECTION AFTER ${d.years} YEARS</div>
          ${row('🏦 Invested Value:', fmtMoney(d.finalInvested), 'green')}
          ${row('🏧 Savings Only:', fmtMoney(d.finalSaved), 'red')}
          ${row('💸 Total Contributed:', fmtMoney(d.totalContrib))}
          ${row('✨ Interest Earned:', fmtMoney(d.interestEarned), 'gold')}
          ${row('📅 End Year / Age:', `${d.endYear} / ${d.endAge} yrs`, 'muted')}
        </div>
        <div class="section">
          <div class="section-title" style="color:${colors.gold}">● TO BE A MILLIONAIRE IN YOUR WINDOW</div>
          ${milestoneWindow}
          ${row('🗓️ Target Year / Age:', `${d.currentYear + d.years} / ${d.age + d.years} yrs`, 'muted')}
        </div>
        <div class="section">
          <div class="section-title" style="color:${colors.purple}">● AT CURRENT CONTRIBUTION RATE</div>
          ${row('📆 Millionaire Year:', millionaireYear, 'purple')}
          ${row('🎂 At Age:', millionaireAge, 'purple')}
        </div>`;
    }

    function drawChart(years, startYear, startAge, invested, saved) {
      const container = $('chartContainer');
      const width = Math.max(320, Math.floor(container.clientWidth || container.getBoundingClientRect().width || 700));
      const height = width < 600 ? 320 : 460;
      const pad = { top: 28, right: 18, bottom: 70, left: 78 };
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;
      const xs = Array.from({ length: years }, (_, i) => startYear + i + 1);
      const maxY = Math.max(1000000, ...invested, ...saved) * 1.08;
      const xScale = (i) => pad.left + (i / Math.max(1, years - 1)) * innerW;
      const yScale = (v) => pad.top + innerH - (v / maxY) * innerH;
      const linePath = (arr) => arr.map((v, i) => `${i===0?'M':'L'} ${xScale(i).toFixed(2)} ${yScale(v).toFixed(2)}`).join(' ');
      const areaPath = (arr) => `${linePath(arr)} L ${xScale(arr.length - 1).toFixed(2)} ${yScale(0).toFixed(2)} L ${xScale(0).toFixed(2)} ${yScale(0).toFixed(2)} Z`;

      let grid = '';
      for (let i = 0; i <= 5; i++) {
        const y = pad.top + (innerH / 5) * i;
        const value = maxY * (1 - i / 5);
        grid += `<line x1="${pad.left}" y1="${y}" x2="${pad.left + innerW}" y2="${y}" stroke="${colors.border}" stroke-dasharray="4 4"/>`;
        grid += `<text x="${pad.left - 8}" y="${y + 4}" fill="${colors.subtext}" font-size="12" text-anchor="end">${esc(fmtMoney(value, 0))}</text>`;
      }

      let ticks = '';
      const tickCount = Math.min(8, years);
      for (let i = 0; i < tickCount; i++) {
        const idx = Math.round((i / Math.max(1, tickCount - 1)) * (years - 1));
        const x = xScale(idx);
        const yr = xs[idx];
        const age = startAge + (yr - startYear);
        ticks += `<line x1="${x}" y1="${pad.top + innerH}" x2="${x}" y2="${pad.top + innerH + 6}" stroke="${colors.border}"/>`;
        ticks += `<text x="${x}" y="${pad.top + innerH + 20}" fill="${colors.subtext}" font-size="11" text-anchor="middle">${yr}</text>`;
        ticks += `<text x="${x}" y="${pad.top + innerH + 34}" fill="${colors.subtext}" font-size="10" text-anchor="middle">age ${age}</text>`;
      }

      const millionY = yScale(1000000);
      const svg = `
        <svg id="chartSvg" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio growth chart">
          <rect width="100%" height="100%" fill="${colors.bg}" rx="12"/>
          <text x="${width/2}" y="18" fill="${colors.text}" font-size="14" text-anchor="middle">Portfolio Growth Over Time</text>
          ${grid}
          <line x1="${pad.left}" y1="${millionY}" x2="${pad.left + innerW}" y2="${millionY}" stroke="${colors.gold}" stroke-dasharray="6 5"/>
          <text x="${pad.left + 8}" y="${Math.max(18, millionY - 8)}" fill="${colors.gold}" font-size="12">$1,000,000</text>
          <path d="${areaPath(invested)}" fill="rgba(0,229,255,0.12)"/>
          <path d="${areaPath(saved)}" fill="rgba(255,107,107,0.08)"/>
          <path d="${linePath(invested)}" fill="none" stroke="${colors.accent}" stroke-width="3"/>
          <path d="${linePath(saved)}" fill="none" stroke="${colors.accent2}" stroke-width="3" stroke-dasharray="8 5"/>
          <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerH}" stroke="${colors.border}" stroke-width="1.2"/>
          <line x1="${pad.left}" y1="${pad.top + innerH}" x2="${pad.left + innerW}" y2="${pad.top + innerH}" stroke="${colors.border}" stroke-width="1.2"/>
          ${ticks}
        </svg>`;
      container.innerHTML = svg;
    }

    function calculateAndRender() {
      try {
        const { balance, monthly, years, annualReturn, age, currentYear } = parseInputs();
        const finalInvested = futureValue(balance, monthly, annualReturn, years);
        const finalSaved = savingsValue(balance, monthly, years);
        const totalContrib = balance + monthly * years * 12;
        const interestEarned = finalInvested - totalContrib;
        const pmtNeeded = monthlyNeededForMillion(balance, annualReturn, years);
        const yrsNeeded = yearsToMillion(balance, monthly, annualReturn);
        const endAge = age + years;
        const endYear = currentYear + years;
        const series = yearlySeries(balance, monthly, annualReturn, years);
        renderResults({ balance, monthly, years, annualReturn, age, currentYear, finalInvested, finalSaved, totalContrib, interestEarned, pmtNeeded, yrsNeeded, endAge, endYear });
        drawChart(years, currentYear, age, series.invested, series.saved);
        $('fileStatus').textContent = 'Calculated successfully.';
      } catch (err) {
        $('fileStatus').textContent = err.message;
      }
    }

    function resetDefaults() {
      $('balance').value = 10000; $('monthly').value = 500; $('years').value = 30; $('annualReturn').value = 8; $('age').value = 30; $('currentYear').value = 2026; calculateAndRender();
    }
    function applyImportedData(data) {
      const map = { balance:['balance','current_balance','pv'], monthly:['monthly','monthly_contribution','pmt'], years:['years','years_to_invest'], annualReturn:['return','annual_return','annualReturn','r_annual'], age:['age','current_age'], currentYear:['year','current_year','currentYear'] };
      for (const [field, aliases] of Object.entries(map)) for (const key of aliases) if (data[key] !== undefined && data[key] !== '') { $(field).value = data[key]; break; }
      calculateAndRender();
    }
    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean); if (lines.length < 2) throw new Error('CSV needs a header row and one data row.');
      const headers = lines[0].split(',').map(h => h.trim()); const values = lines[1].split(',').map(v => v.trim()); const out = {}; headers.forEach((h, i) => out[h] = values[i]); return out;
    }

    $('calcBtn').addEventListener('click', calculateAndRender);
    $('resetBtn').addEventListener('click', resetDefaults);
    $('configFile').addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0]; if (!file) return;
      try {
        const text = await file.text(); let data;
        if (file.name.toLowerCase().endsWith('.json')) data = JSON.parse(text);
        else if (file.name.toLowerCase().endsWith('.csv')) data = parseCsv(text);
        else throw new Error('Use a .json or .csv file.');
        applyImportedData(data); $('fileStatus').textContent = `Imported values from ${file.name}.`;
      } catch (err) { $('fileStatus').textContent = `Import failed: ${err.message}`; }
    });
    window.addEventListener('resize', () => window.requestAnimationFrame(calculateAndRender));
    window.addEventListener('load', () => window.requestAnimationFrame(calculateAndRender));
  </script>
</body>
</html>
